<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akosua — Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HERO -->
  <section class="hero">
      <div class="name-wrapper" id="nameWrapper">
        <p class="label">PERSONAL PORTFOLIO</p>
    <h1 class="name">AKOSUA</h1>
  </div>

  </section>
  


  <!-- FILES / PROJECTS -->
  <section class="scroll-section">
    <div class="sticky-container">
      <h1 class="files-title">The Files</h1>
      <div class="stack">
        <div class="card">
          <img src="project1.jpg" alt="Project 1" class="card-img">
          <h2 class="card-title">Project 1</h2>
          <p class="card-desc">Description for Project 1.</p>
          <button>Button</button>
        </div>

        <div class="card">
          <img src="project2.jpg" alt="Project 2" class="card-img">
          <h2 class="card-title">Project 2</h2>
          <p class="card-desc">Description for Project 2.</p>
        </div>

        <div class="card">
          <img src="project3.jpg" alt="Project 3" class="card-img">
          <h2 class="card-title">Project 3</h2>
          <p class="card-desc">Description for Project 3.</p>
        </div>

        <div class="card">
          <img src="project4.jpg" alt="Project 4" class="card-img">
          <h2 class="card-title">Project 4</h2>
          <p class="card-desc">Description for Project 4.</p>
        </div>
      </div>
    </div>
  </section>
  

  <!-- NEXT SECTION -->
  <section class="after-files">
    <h2>Next Section</h2>
      <!--Lava Lamp-->
 <script src="https://ritual.sh/js/adoptables/lavalamp.js"
        data-bg-color-1="#000000"
        data-bg-color-2="#000000"
        data-blob-color-1="#fdf1ed"
        data-blob-color-2="#dfbfb9"
        data-case-color="#333333"
       data-blob-count="6"
        data-speed="1.1"
        data-blob-size="0.7"></script>


  <script src="script.js"></script>
</body>
</html>
