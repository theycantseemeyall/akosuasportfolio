<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Blog Post</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg: #faf7f5;
  --card: #ffffff;
  --primary: #8b1a2e;
  --primary-dark: #5f0413;
  --accent: #d4a5ad;
  --text: #2d2d2d;
  --shadow: rgba(95, 4, 19, 0.12);
}

    * {
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}

    .container {
  max-width: 800px;
  margin: auto;
  background: var(--card);
  padding: 2rem;
  border-radius: 20px;
  box-shadow: 0 8px 20px var(--shadow);
  border-top: 5px solid var(--primary);
}

   h1 {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  color: var(--primary);
}
    .date {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 1rem;
    }

    .cover-img {
  width: 100%; /* Keep it full width */
  height: 10px; /* Set a fixed height for the banner */
  object-fit: cover; /* Ensures the image covers the space without distortion */
  border-radius: 15px;
  margin: 1.5rem 0;
}

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 15px;
      margin-bottom: 1.5rem;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 15px;
    }

    .content {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
  background: var(--primary);
  color: white;
  padding: 0.4rem 0.8rem;
  border-radius: 999px;
  font-size: 0.8rem;
}

   .back-btn {
  display: inline-block;
  margin-top: 2rem;

  text-decoration: none;
  background: white;
  color: black;

  padding: 0.7rem 1.2rem;
  border-radius: 20px;

  box-shadow: rgb(0 0 0 / 5%) 0 0 8px;

  letter-spacing: 1.5px;
  text-transform: uppercase;

  transition: all 0.5s ease;
}

.back-btn:hover {
  letter-spacing: 3px;
  background-color: var(--primary);
  color: white;
  box-shadow: rgb(95, 4, 19) 0px 7px 29px 0px;
}

    .post-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    .nav-link {
  text-decoration: none;
  color: var(--primary);
  font-weight: bold;
  background: rgba(139, 26, 46, 0.08);
  padding: 0.6rem 1rem;
  border-radius: 12px;
  transition: 0.3s ease;
}

.nav-link:hover {
  background: rgba(139, 26, 46, 0.15);
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Revital</h1>
    <div class="date">Wednesday, 2nd June 2026</div>

    <img src="banner1.jpeg" alt="Project Cover" class="cover-img" />

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/yourVideoID" allowfullscreen></iframe>
    </div>

    <div class="content">
        <p>Your project description goes here.</p></p>
    </div>

    <div class="tags">
      <div class="tag">#tag1</div>
      <div class="tag">#tag2</div>
      <div class="tag">#tag3</div>
      <div class="tag">#tag4</div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
    <div class="post-nav">
        <a href="" class="nav-link">← Previous Project</a>
        <a href="Baymax_P2.html" class="nav-link">Next Project →</a>
      </div>
      <img src="banner1.jpeg" alt="Project Cover" class="cover-img" />
  </div>
</body>
</html>
